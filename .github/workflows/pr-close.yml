---
name: PR Close
permissions: {}

on: # yamllint disable-line rule:truthy
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}

jobs:
  publish-tag:
    name: Publish Tag
    runs-on: ubuntu-latest
    if: (startsWith(github.head_ref, 'release/') && github.event.pull_request.merged)
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
      - name: tag
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -x
          MODULE=$(sed -nE 's/release\/([a-zA-Z0-9_-]+)/\1/p' <<< "$HEAD_REF")
          TAG=$(jq -r --arg module "$MODULE" '.[$module] | .versions[.latest].tag' modules.json)
          [[ "$MODULE" == "null" || "$TAG" == "null" ]] && exit 1
          git tag "$TAG" -f
          git push origin "$TAG" -f