---
name: Generate Changelog

permissions:
  contents: read

on: # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      head:
        description: The HEAD to get changes from
        required: true
        type: string
      path:
        description: The path to include in the changelog
        required: true
        type: string
      module:
        description: The module to generate the changelog for
        required: true
        type: string
    outputs:
      changes:
        description: "Unreleased changes"
        value: "${{ jobs.changelog.outputs.changes }}"

env:
  INPUTS_PATH: ${{ inputs.path }}
  INPUTS_MODULE: ${{ inputs.module }}

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      changes: "${{ steps.changelog.outputs.content }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.head }}
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Git Cliff
        id: changelog
        run: |
          GLOB="$(sed 's,//,/,' <<< ${INPUTS_PATH}/*)"
          code=$?; [[ "$code" != "0" ]] && exit $code
          echo 'content<<EOF' >> "$GITHUB_OUTPUT"
          uvx --from=git-cliff@2.13.1 git-cliff \
            --unreleased \
            --include-path "${GLOB}" \
            --tag-pattern "${INPUTS_MODULE}/v?[0-9]+.[0-9]+.[0-9]+" \
            --config cliff.toml | tee -a "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"
