# Move non-release PRs to dev branch
---
name: PR Open/Edit

permissions:
  contents: read

on: # yamllint disable-line rule:truthy
  pull_request:
    types: [opened, reopened, edited, synchronize]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}

jobs:
  modules:
    name: Modules
    uses: ./.github/workflows/def_list-modules.yml
    if: ${{ !startsWith(github.event.pull_request.head.ref, 'release/') }}

  pr-tags:
    name: Add tags
    if: ${{ !startsWith(github.event.pull_request.head.ref, 'release/') }}
    runs-on: ubuntu-latest
    needs: modules
    steps:
    - name: Add tags
      env:
        CHANGED_MODULES: ${{ needs.modules.outputs.changed_modules }}
        UNCHANGED_MODULES: ${{ needs.modules.outputs.unchanged_modules }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run:
        if [[ "${CHANGED_MODULES}" != '[]' ]]; then
          labels_add=$(yq 'map(.name) |  join(",")' <<< "${CHANGED_MODULES}")
          gh pr edit "$PR_NUMBER" --add-label $labels_add
        fi

        if [[ "${UNCHANGED_MODULES}" != '[]' ]]; then
          labels_remove=$(yq 'map(.name) |  join(",")' <<< "${UNCHANGED_MODULES}")
          gh pr edit "$PR_NUMBER" --remove-label $labels_remove
        fi

  pytest-latest:
    uses: ./.github/workflows/def_pytest.yml
    if: ${{ !startsWith(github.event.pull_request.head.ref, 'release/') }}
    needs: modules
    permissions:
      checks: write
      pull-requests: write
    strategy:
      matrix:
        include: ${{ fromJson(needs.modules.outputs.changed_modules) }}
    with:
      pr-head-sha: ${{ github.event.pull_request.head.sha }}
      module: ${{ matrix.name }}
      path: ${{ matrix.path }}
      version: ${{ github.event.pull_request.head.sha }}
      cellophane-repo: ClinicalGenomicsGBG/cellophane
      cellophane-tag: latest
      check-fail: true

  pytest-dev:
    uses: ./.github/workflows/def_pytest.yml
    if: ${{ !startsWith(github.event.pull_request.head.ref, 'release/') }}
    needs: modules
    permissions:
      checks: write
      pull-requests: write
    strategy:
      matrix:
        include: ${{ fromJson(needs.modules.outputs.changed_modules) }}
    with:
      pr-head-sha: ${{ github.event.pull_request.head.sha }}
      module: ${{ matrix.name }}
      path: ${{ matrix.path }}
      version: ${{ github.event.pull_request.head.sha }}
      cellophane-repo: ClinicalGenomicsGBG/cellophane
      cellophane-tag: dev
      check-fail: true

  pytest-publish:
    name: Publish pytest results
    if: ${{ !startsWith(github.event.pull_request.head.ref, 'release/') }}
    runs-on: ubuntu-latest
    needs: [pytest-latest, pytest-dev]
    steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: '*.pytest.xml'
    - name: Merge reports
      run: |
        npx --package=junit-report-merger@9.0.3 -c 'jrm merged-dev.xml */*-dev.pytest.xml'
        npx --package=junit-report-merger@9.0.3 -c 'jrm merged-latest.xml */*-latest.pytest.xml'
    - uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
      with:
        check_name: Test Results (cellophane@latest)
        files: merged-latest.xml
        commit: ${{ github.event.pull_request.head.sha }}
    - uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
      with:
        check_name: Test Results (cellophane@dev)
        files: merged-dev.xml
        commit: ${{ github.event.pull_request.head.sha }}
